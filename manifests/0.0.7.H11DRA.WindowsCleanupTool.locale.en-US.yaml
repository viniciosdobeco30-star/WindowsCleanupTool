ShortDescription: Advanced Windows cleanup and performance optimization tool
Description: |-
  Windows Cleanup Tool is a comprehensive utility for Windows system maintenance and performance optimization.
  
  Features:
  - Quick and full system cleanup (temporary files, recycle bin, prefetch)
  - Create system restore points for safety
  - Drive optimization (defrag/trim)
  - Performance mode tweaks (power plans, services optimization)
  - Malware scanning with Microsoft Defender
  - Hardware information monitoring
  - Network diagnostic tools
  - Speed testing capabilities
  - System report generation
  
  The tool supports both English and Portuguese languages and requires administrator privileges to function properly.
